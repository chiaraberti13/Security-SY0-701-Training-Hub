name: CompTIA Security+ SY0-701 CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run ESLint Checks
        run: npm run lint

      - name: Run CompTIA Coverage Validator (T-C0)
        run: npm run test:coverage

      - name: Run Vitest Suite (T-C1)
        run: npm run test

      - name: Compile and Build Application (T-C4 / smoke test)
        run: npm run build
